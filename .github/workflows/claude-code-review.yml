name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/claude-review')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Go reference
        uses: actions/cache@v4
        with:
          path: charon
          key: charon-go-ref-v1.7.1

      - name: Prepare Go reference checkout
        run: |
          if [ ! -d charon/.git ] || ! git -C charon describe --tags --exact-match HEAD 2>/dev/null | grep -qx 'v1.7.1'; then
            rm -rf charon
            git clone --branch v1.7.1 --depth 1 https://github.com/ObolNetwork/charon.git charon
          fi
          git -C charon rev-parse HEAD

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_KEY }}
          track_progress: true
          prompt: '/review-pr ${{ github.event.pull_request.number || github.event.issue.number }}'
