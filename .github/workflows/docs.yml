name: Build and deploy documentation

on:
  workflow_dispatch: # Run manually from Actions tab
  push:
    branches: ["main"] # Runs on pushes to main branch
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "flake.nix"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings -C debuginfo=0"

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Update apt package list
        run: sudo apt-get update

      - name: Install `protobuf`
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: protobuf-compiler=3.21.12*
          version: 3.21.12

      - name: Install `oas3-gen`
        run: cargo install oas3-gen@0.24.0

      - name: Setup pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Clean docs folder
        run: cargo clean --doc

      - name: Build documentation
        run: cargo doc --locked --no-deps --workspace --all-features

      - name: Add redirect
        run: echo '<meta http-equiv="refresh" content="0;url=pluto/index.html">' > target/doc/index.html

      - name: Remove lock file
        run: rm target/doc/.lock

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
