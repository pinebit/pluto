syntax = "proto3";

package sync;

import "google/protobuf/timestamp.proto";

message MsgSync {
 google.protobuf.Timestamp timestamp = 1;
 bytes hash_signature = 2;
 bool shutdown = 3;
 string version = 4;
 int64 step = 5;
}

message MsgSyncResponse {
  google.protobuf.Timestamp sync_timestamp = 1;
  string error = 2;
}
