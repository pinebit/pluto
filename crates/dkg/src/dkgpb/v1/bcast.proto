syntax = "proto3";

package bcast;

import "google/protobuf/any.proto";

message BCastSigRequest {
  reserved 2;
  string id   = 1;
  google.protobuf.Any message = 3;
}

message BCastSigResponse {
  string id        = 1;
  bytes  signature = 2;
}

message BCastMessage {
  string              id         = 1;
  google.protobuf.Any message    = 2;
  repeated bytes      signatures = 3;
}